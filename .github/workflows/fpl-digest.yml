name: FPL Digest

# Regenerates digest.json weekly and commits it back to the repo. GitHub-hosted
# runners have open outbound internet, so they CAN reach the FPL API — unlike the
# newsletter routine's sandbox. Runs ~1h before the newsletter routine (Tue 07:00 UTC).

on:
  schedule:
    - cron: "0 6 * * 2" # Tuesday 06:00 UTC
  workflow_dispatch: {} # allow manual "Run workflow" for testing

permissions:
  contents: write

concurrency:
  group: fpl-digest
  cancel-in-progress: false

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate digest.json
        run: node analyze.js 1899953

      - name: Show summary
        run: node -e "const d=require('./digest.json');console.log('season',d.meta.season,'state',d.meta.seasonState,'lastGw',d.meta.lastFinishedGw,'nextGw',d.meta.nextGw,'generatedAt',d.meta.generatedAt)"

      - name: Commit updated digest
        run: |
          git config user.name "fpl-digest-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          if git diff --staged --quiet; then
            echo "digest.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh digest.json [skip ci]"
            git push
          fi
